# =====================================================================
# 信息小部件 / Information widgets (顶部组件区)
# 文档: https://gethomepage.dev/widgets/info/
# =====================================================================

# 站点 logo (左侧)
- logo:
    icon: /images/logo.png

# 问候语 - 会按当前时段显示 "早安/午安/晚安"
- greeting:
    text_size: 4xl
    text: "DK 主页"

# 日期与时间
- datetime:
    text_size: xl
    format:
      timeStyle: short      # short = HH:mm
      dateStyle: short      # short = 2026/05/18
      hourCycle: h23        # 24 小时制

# 系统资源 (CPU / 内存 / 磁盘)
- resources:
    label: VPS
    cpu: true
    memory: true
    disk: /

# 天气 (open-meteo 免费, 不需要 key)
# 默认: 广州。可改成你的城市经纬度
- openmeteo:
    label: 广州
    latitude: 23.1291
    longitude: 113.2644
    timezone: Asia/Shanghai
    units: metric           # metric (摄氏) | imperial (华氏)
    cache: 10               # 缓存分钟数
    format:
      maximumFractionDigits: 1

# 搜索框 (右侧)
- search:
    provider: [bing, baidu, google, duckduckgo]
    target: _blank
    focus: false
    showSearchSuggestions: true
