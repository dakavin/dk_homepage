# 工作流名称，会显示在 GitHub Actions 页面
name: Build and Push Homepage Image

# 触发条件：push 到 main 时构建镜像；也允许在 Actions 页面手动运行
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker-publish.yml"
      - "Dockerfile"
      - ".dockerignore"
      - "config/**"
      - "public/**"
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.*"
      - "tailwind.config.*"
  workflow_dispatch:

# 环境变量，下面构建步骤会复用
env:
  # GHCR 是 GitHub 的容器镜像仓库
  REGISTRY: ghcr.io
  # 镜像名使用当前仓库名
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    # 使用 GitHub 托管的 Ubuntu 构建机
    runs-on: ubuntu-22.04
    # 允许读取代码和写入 GitHub Packages
    permissions:
      contents: read
      packages: write

    steps:
      # 拉取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 登录 GHCR，GITHUB_TOKEN 是 GitHub 自动提供的临时令牌
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 生成镜像标签：latest 给 Watchtower 使用，sha 标签用于回滚定位
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      # 启用 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 构建并推送 linux/amd64 镜像到 GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
